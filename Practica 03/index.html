<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Página HTML5</title>
    <style>
        /* Estilos para mi pagina */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        /* Fondo para el contenedor */ 
        #contenedor-principal {
            background-color: #ffffff; 
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            width: 400px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
         /* Color de texto */
        h1 {
            color: #2c3e50;
            text-align: center;
        }

        p {
            line-height: 1.6;
            color: #555;
        }

        /* Estilo para resaltar palabras con span */
        .resaltado {
            color: #e74c3c; /* Color llamativo */
            font-weight: bold; /* Negrita */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <section id="seccion-inicio">
        
        <div id="contenedor-principal">
            
            <h1>Aprendiendo Desarrollo Web</h1>
            
            <p>
                Para dominar la programación web es fundamental comprender la 
                <span class="resaltado">estructura</span> de las etiquetas, 
                practicar la <span class="resaltado">semántica</span> de HTML5 
                y mantener la <span class="resaltado">creatividad</span> al diseñar interfaces.
            </p>

        </div>

    </section>

</body>
</html>
